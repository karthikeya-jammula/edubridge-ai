# ============================================
# EduBridge AI – Docker Compose (Hackathon MVP)
# Simple single-container setup with SQLite
# ============================================

version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edubridge-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:./dev.db
      JWT_SECRET: ${JWT_SECRET:-hackathon-demo-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ./data:/app/data  # Persist SQLite data
